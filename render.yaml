services:
  - type: web
    name: fitflow-agent-api
    runtime: python
    plan: free
    buildCommand: python -m pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FITFLOW_LLM_PROVIDER
        value: mock
      - key: PYTHON_VERSION
        value: 3.11.9
